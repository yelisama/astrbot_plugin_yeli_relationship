<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夜璃关系本 v1.2 · 管理</title>
  <style>
    /* ========================================
       令牌 & 动画基础
    ======================================== */
    /* === 基础设计令牌 === */
    :root {
      --duration-fast: 0.15s;
      --duration-normal: 0.25s;
      --duration-slow: 0.35s;
      --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 18px;
    }

    /* === 主题1：玻璃青蓝（默认） === */
    :root, [data-theme="glass"] {
      --body-bg: linear-gradient(145deg, #e8f0f2 0%, #dee9ed 25%, #e3edf5 50%, #e0ebe8 75%, #e6f0ef 100%);
      --spot1: #b8dbd3; --spot2: #c4dce8;
      --glass-bg: rgba(255,255,255,0.62);
      --glass-border: rgba(255,255,255,0.55);
      --glass-shadow: 0 8px 32px rgba(15,23,42,0.05), 0 2px 8px rgba(15,23,42,0.03);
      --glass-edge: rgba(255,255,255,0.7);
      --text: #1a2332; --text-soft: #4a5568; --muted: #8899aa;
      --accent: #5b9a8b; --accent-strong: #3d7a6e; --accent-soft: #c8e6df;
      --danger: #e07b6e; --danger-soft: #fef0ed; --ok: #4a9e6b; --warn: #d4a853;
      --heading: #2d4a43;
      --input-bg: rgba(255,255,255,0.55); --input-border: rgba(139,160,175,0.2);
      --table-stripe: rgba(255,255,255,0.45); --th-bg: rgba(237,241,245,0.75);
      --divider: rgba(139,160,175,0.1); --divider-light: rgba(139,160,175,0.08);
    }

    /* === 主题2：浅蓝 === */
    [data-theme="sky"] {
      --body-bg: linear-gradient(145deg, #e3edf8 0%, #dce6f2 25%, #e8f0fa 50%, #e0eaf5 75%, #ecf3fb 100%);
      --spot1: #b0cce8; --spot2: #c8ddf0;
      --glass-bg: rgba(255,255,255,0.6);
      --glass-border: rgba(255,255,255,0.55);
      --glass-shadow: 0 8px 32px rgba(30,50,80,0.05), 0 2px 8px rgba(30,50,80,0.03);
      --glass-edge: rgba(255,255,255,0.7);
      --text: #1a2638; --text-soft: #3d5068; --muted: #7a8ea0;
      --accent: #5080b8; --accent-strong: #3a6595; --accent-soft: #c8ddf0;
      --danger: #d07060; --danger-soft: #fef0ed; --ok: #4a8e6b; --warn: #c89840;
      --heading: #2a3d58;
      --input-bg: rgba(255,255,255,0.55); --input-border: rgba(120,150,180,0.2);
      --table-stripe: rgba(255,255,255,0.45); --th-bg: rgba(235,240,248,0.75);
      --divider: rgba(120,150,180,0.1); --divider-light: rgba(120,150,180,0.08);
    }

    /* === 主题3：纸张黄 === */
    [data-theme="paper"] {
      --body-bg: linear-gradient(145deg, #f5f0e5 0%, #f0ead8 25%, #f6f2e8 50%, #f2ede0 75%, #f8f4ec 100%);
      --spot1: #e8d8b8; --spot2: #efe0c8;
      --glass-bg: rgba(255,252,245,0.7);
      --glass-border: rgba(220,200,170,0.45);
      --glass-shadow: 0 8px 32px rgba(60,40,20,0.06), 0 2px 8px rgba(60,40,20,0.04);
      --glass-edge: rgba(255,252,245,0.8);
      --text: #3d3028; --text-soft: #5c4a38; --muted: #988878;
      --accent: #9b7b58; --accent-strong: #7a6040; --accent-soft: #e8d8c0;
      --danger: #c06850; --danger-soft: #fef0eb; --ok: #5a8a58; --warn: #b88830;
      --heading: #4a3828;
      --input-bg: rgba(255,250,240,0.65); --input-border: rgba(180,160,140,0.25);
      --table-stripe: rgba(255,250,240,0.55); --th-bg: rgba(245,238,225,0.8);
      --divider: rgba(180,160,140,0.12); --divider-light: rgba(180,160,140,0.08);
    }

    /* === 主题4：护眼绿 === */
    [data-theme="green"] {
      --body-bg: linear-gradient(145deg, #e8f0e5 0%, #dce8d8 25%, #e5f0e2 50%, #e0ece0 75%, #eaf2e8 100%);
      --spot1: #b8d8b8; --spot2: #c8e0c0;
      --glass-bg: rgba(255,255,250,0.62);
      --glass-border: rgba(200,220,200,0.5);
      --glass-shadow: 0 8px 32px rgba(30,50,30,0.05), 0 2px 8px rgba(30,50,30,0.03);
      --glass-edge: rgba(255,255,250,0.7);
      --text: #1e3028; --text-soft: #3d5240; --muted: #7a9078;
      --accent: #5a8a60; --accent-strong: #3d6e45; --accent-soft: #c8e0c8;
      --danger: #c86858; --danger-soft: #fef0eb; --ok: #4a8a50; --warn: #b08830;
      --heading: #2a4030;
      --input-bg: rgba(255,255,250,0.55); --input-border: rgba(140,170,140,0.2);
      --table-stripe: rgba(255,255,250,0.45); --th-bg: rgba(235,242,232,0.75);
      --divider: rgba(140,170,140,0.1); --divider-light: rgba(140,170,140,0.08);
    }

    /* === 夜间模式（叠加到任何主题上） === */
    [data-theme-mode="dark"] {
      --body-bg: #1a1f24 !important;
      --spot1: #2a3a3a; --spot2: #2a3540;
      --glass-bg: rgba(30,36,44,0.75);
      --glass-border: rgba(255,255,255,0.08);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.15);
      --glass-edge: rgba(255,255,255,0.06);
      --text: #dce4ec; --text-soft: #a0b0c0; --muted: #6a7888;
      --accent: #7fa3c8; --accent-strong: #9bbce0; --accent-soft: #25384c;
      --danger: #e88878; --danger-soft: #3a2824; --ok: #6ab880; --warn: #d0a850;
      --heading: #c0d8cc;
      --input-bg: rgba(40,48,56,0.7); --input-border: rgba(255,255,255,0.1);
      --table-stripe: rgba(255,255,255,0.03); --th-bg: rgba(35,42,50,0.85);
      --divider: rgba(255,255,255,0.06); --divider-light: rgba(255,255,255,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--body-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      font-size: 14px;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* 背景光斑 */
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; filter: blur(80px);
      opacity: 0.4; z-index: 0; pointer-events: none;
      transition: background 0.6s;
    }
    body::before { width: 380px; height: 380px; background: radial-gradient(circle, var(--spot1) 0%, transparent 70%); top: -100px; right: -80px; }
    body::after  { width: 300px; height: 300px; background: radial-gradient(circle, var(--spot2) 0%, transparent 70%); bottom: -60px; left: -60px; }

    /* ========================================
       布局
    ======================================== */
    .app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 14px;
      padding: 18px;
      max-width: 1500px;
      margin: 0 auto;
    }

    .sidebar, .main, .inspector { min-width: 0; }
    .sidebar { display: flex; flex-direction: column; gap: 12px; }
    .sidebar .panel { margin-top: 0 !important; }

    /* ========================================
       通用面板（玻璃卡片）
    ======================================== */
    .panel {
      background: var(--glass-bg);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-edge);
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(139,160,175,0.15);
    }
    .panel-head h2 { font-size: 14px; font-weight: 650; color: var(--heading); margin: 0; }
    .panel-body { padding: 14px 16px; }

    /* ========================================
       品牌区
    ======================================== */
    .brand { margin-bottom: 12px; text-align: center; }
    .brand h1 { font-size: 20px; font-weight: 650; letter-spacing: 1px; color: var(--heading); margin: 0 0 8px; }
    .version-badge { display: inline-flex; align-items: center; height: 20px; margin-left: 6px; padding: 0 8px; border-radius: 999px; background: rgba(139,160,175,0.14); color: var(--text-soft); font-size: 11px; font-weight: 650; vertical-align: middle; letter-spacing: 0; }
    .brand-subtitle { color: var(--muted); font-size: 12px; line-height: 1.5; margin: 0 auto 6px; max-width: 230px; }
    .brand .back-btn {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
      padding: 7px 14px; border-radius: 50px; font-size: 12px; font-weight: 600;
      background: var(--accent); color: #fff; text-decoration: none;
      transition: all var(--duration-fast); opacity: 0.85;
    }
    .brand .back-btn:hover { opacity: 1; box-shadow: 0 2px 10px rgba(91,154,139,0.3); transform: translateY(-1px); }

    /* ========================================
       作用域按钮（胶囊风格）
    ======================================== */
    .scope-list {
      display: grid; gap: 6px;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
    }
    .scope-btn {
      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px 14px;
      border: 1px solid rgba(139,160,175,0.18);
      border-radius: 50px;
      background: var(--input-bg);
      color: var(--text-soft);
      font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: left;
      transition: all var(--duration-normal) var(--ease-out);
      position: relative; overflow: hidden;
    }
    .scope-btn:hover { background: var(--glass-bg); border-color: rgba(139,160,175,0.35); }
    .scope-btn.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      font-weight: 600; box-shadow: 0 2px 10px rgba(91,154,139,0.25);
      transform: translateX(3px);
    }
    .scope-btn.active::before {
      content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
      width: 3px; border-radius: 2px; background: var(--glass-bg); opacity: 0.6;
      animation: slideInLeft 0.2s var(--ease-out);
    }
    @keyframes slideInLeft { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 0.6; } }
    .scope-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scope-meta { font-size: 11px; flex-shrink: 0; opacity: 0.8; }
    .scope-btn.active .scope-meta { opacity: 0.9; }

    /* ========================================
       快捷表单
    ======================================== */
    .quick-form { display: grid; gap: 8px; margin-top: 12px; }

    /* ========================================
       顶部栏
    ======================================== */
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .current h2 { font-size: 18px; margin: 0; color: var(--heading); }
    .current p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .runtime-status {
      display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px;
      margin: 0 0 12px;
    }
    .status-chip {
      min-height: 56px; padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-edge);
      display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0;
    }
    .status-chip span { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-chip strong { color: var(--heading); font-size: 13px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-chip.ok { border-color: rgba(74,158,107,0.28); }
    .status-chip.warn { border-color: rgba(212,168,83,0.34); }
    .status-chip.danger { border-color: rgba(224,123,110,0.34); }

    /* ========================================
       统计卡片
    ======================================== */
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
    .stat {
      padding: 14px; min-height: 80px;
      background: var(--glass-bg); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
      box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-edge);
      display: flex; flex-direction: column; justify-content: center;
      transition: transform var(--duration-fast), box-shadow var(--duration-fast);
    }
    .stat:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(15,23,42,0.08), inset 0 1px 0 var(--glass-edge); }
    .stat strong { display: block; font-size: 22px; line-height: 1.2; color: var(--heading); font-weight: 700; }
    .stat span { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; }

    /* ========================================
       工具栏（搜索+筛选）
    ======================================== */
    .toolbar { display: grid; grid-template-columns: minmax(200px, 1fr) 140px; gap: 10px; margin-bottom: 12px; }

    /* ========================================
       表格卡片（整体一块）
    ======================================== */
    .table-card {
      background: var(--glass-bg); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-edge);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; table-layout: fixed; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--divider); text-align: left; vertical-align: middle; box-sizing: border-box; }
    th {
      position: sticky; top: 0; z-index: 2;
      background: var(--th-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: var(--heading); font-weight: 650; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--table-stripe); }
    td { font-size: 13px; }

    /* 固定列宽：表头与内容严格对齐 */
    .col-user-col { width: 14%; }
    .col-aliases-col { width: 14%; }
    .col-title-col { width: 13%; }
    .col-relation-col { width: 9%; }
    .col-importance-col { width: 10%; }
    .col-note-col { width: 14%; }
    .col-active-col { width: 16%; }
    .col-actions-col { width: 10%; }
    td.col-actions, th.col-actions-head { text-align: center; }
    .th-help { display: inline-flex; align-items: center; gap: 4px; }
    .help-dot {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: rgba(139,160,175,0.16); color: var(--muted);
      font-size: 10px; font-weight: 700; cursor: help;
    }

    /* ========================================
       表格内容样式
    ======================================== */
    .qq { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 11px; margin-top: 1px; }
    .main-name {
      display: inline-block;
      max-width: 100%;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: bottom;
    }
    .muted { color: var(--muted); }

    .editable-wrap { position: relative; display: inline-block; max-width: 100%; }
    .editable-wrap .value {
      display: inline-block; max-width: 100%; min-height: 20px; line-height: 1.5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-radius: 5px; padding: 2px 6px; cursor: text; transition: background var(--duration-fast);
    }
    .editable-wrap .value:hover { background: rgba(139,160,175,0.1); }
    .editable-wrap .value.empty { color: var(--muted); font-style: italic; }
    .editable-wrap .edit-hint {
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--muted); opacity: 0; pointer-events: none;
      transition: opacity var(--duration-fast);
    }
    .editable-wrap:hover .edit-hint { opacity: 0.5; }

    .edit-input { width: 100%; min-width: 80px; }

    /* 锁按钮 */
    .lock-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border: none; border-radius: 5px; padding: 0;
      background: transparent; cursor: pointer; color: var(--muted);
      transition: all var(--duration-fast);
      flex-shrink: 0;
    }
    .lock-btn:hover { background: rgba(139,160,175,0.12); }
    .lock-btn.locked { color: var(--warn); }
    .lock-btn svg { width: 12px; height: 12px; }

    .user-cell { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .user-cell .name-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .user-cell .name-row .editable-wrap { min-width: 0; max-width: calc(100% - 28px); }
    .alias-line { color: var(--muted); font-size: 12px; }
    .alias-line .editable-wrap { display: inline-flex; align-items: center; max-width: calc(100% - 24px); }

    .pill {
      display: inline-flex; align-items: center; height: 22px; padding: 2px 8px;
      border-radius: 999px; font-size: 11px; font-weight: 500;
    }
    .pill.ok { background: rgba(74,158,107,0.12); color: var(--ok); }
    .pill.warn { background: rgba(212,168,83,0.12); color: var(--warn); }
    .pill.neutral { background: rgba(139,160,175,0.1); color: var(--text-soft); }
    .importance-wrap { flex-wrap: wrap; row-gap: 4px; }
    td.col-note .editable-wrap,
    td.col-note .editable-wrap .value,
    td.col-user .editable-wrap,
    td.col-user .editable-wrap .value {
      max-width: 100%;
    }
    .importance-level {
      display: inline-flex; align-items: center; height: 20px; padding: 1px 7px;
      border-radius: 999px; background: rgba(139,160,175,0.12);
      color: var(--text-soft); font-size: 11px; white-space: nowrap;
    }

    .active-cell { display: flex; flex-direction: column; gap: 3px; font-size: 12px; }

    /* ========================================
       分页栏
    ======================================== */
    .pagination {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 10px 16px;
      border-top: 1px solid rgba(139,160,175,0.12);
    }
    .pager-left, .pager-right { display: flex; align-items: center; gap: 8px; }
    .pager-info { color: var(--muted); font-size: 12px; white-space: nowrap; }

    /* ========================================
       按钮系统
    ======================================== */
    button, .btn {
      border: 0; border-radius: 7px; padding: 8px 14px; font: inherit; font-size: 13px;
      cursor: pointer; white-space: nowrap;
      transition: all var(--duration-fast) var(--ease-out);
      display: inline-flex; align-items: center; gap: 5px;
    }
    button:active { transform: scale(0.97); transition-duration: 0.05s; }

    /* 主按钮 */
    button.primary, .btn-primary { color: #fff; background: var(--accent); }
    button.primary:hover, .btn-primary:hover { background: var(--accent-strong); box-shadow: 0 2px 10px rgba(91,154,139,0.3); transform: translateY(-1px); }

    /* 次按钮 */
    button.secondary {
      color: var(--text-soft); background: var(--input-bg);
      border: 1px solid var(--input-border);
    }
    button.secondary:hover { background: var(--glass-bg); border-color: var(--glass-border); }

    /* 危险按钮 */
    button.danger { color: var(--danger); background: var(--danger-soft); border: 1px solid var(--input-border); }
    button.danger:hover { filter: brightness(0.97); }

    /* 图标按钮 */
    button.icon-btn {
      width: 32px; height: 32px; padding: 0; justify-content: center;
      background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px;
      color: var(--text-soft); font-size: 15px;
    }
    button.icon-btn:hover { background: var(--glass-bg); }
    button.icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* 小图标按钮 */
    button.icon-sm {
      width: 28px; height: 28px; padding: 0; justify-content: center; border-radius: 6px;
      background: transparent; color: var(--text-soft); font-size: 14px;
    }
    button.icon-sm:hover { background: rgba(139,160,175,0.12); }

    /* 危险图标 */
    button.icon-danger {
      width: 28px; height: 28px; padding: 0; justify-content: center; border-radius: 6px;
      background: transparent; color: var(--danger); font-size: 16px; font-weight: 700;
    }
    button.icon-danger:hover { background: var(--danger-soft); }

    .action-buttons { display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
    button.icon-soft {
      width: 28px; height: 28px; padding: 0; justify-content: center; border-radius: 6px;
      background: var(--input-bg); color: var(--text-soft); border: 1px solid var(--input-border);
      font-size: 12px; font-weight: 650;
    }
    button.icon-soft:hover { background: var(--glass-bg); border-color: var(--glass-border); }
    button.icon-soft:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ========================================
       主题切换器
    ======================================== */
    .theme-menu {
      position: fixed; z-index: 90;
      background: var(--glass-bg); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-md);
      box-shadow: 0 12px 40px rgba(15,23,42,0.15), inset 0 1px 0 var(--glass-edge);
      padding: 6px; min-width: 150px; display: none;
    }
    .theme-menu.show { display: block; animation: fadeInUp 0.2s var(--ease-out); }
    .theme-option {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 10px 14px; border: none; border-radius: 10px;
      background: transparent; color: var(--text); font-size: 13px; cursor: pointer;
      transition: background var(--duration-fast);
    }
    .theme-option:hover { background: rgba(139,160,175,0.1); }
    .theme-option.active { background: var(--accent-soft); font-weight: 600; }
    .theme-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.6); }
    .theme-dot.glass { background: linear-gradient(135deg, #b8dbd3, #5b9a8b); }
    .theme-dot.sky   { background: linear-gradient(135deg, #b0cce8, #5080b8); }
    .theme-dot.paper { background: linear-gradient(135deg, #e8d8b8, #9b7b58); }
    .theme-dot.green { background: linear-gradient(135deg, #b8d8b8, #5a8a60); }

    /* 双值显示（同时显示 manual + auto） */
    .dual-value { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .dual-value .v-row { display: flex; align-items: center; gap: 5px; min-width: 0; }
    .dual-value .v-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 4px; flex-shrink: 0;
      font-weight: 600; letter-spacing: 0.3px;
    }
    .v-tag.manual { background: rgba(91,154,139,0.12); color: var(--accent); }
    .v-tag.auto   { background: rgba(139,160,175,0.1); color: var(--muted); }

    /* 通用单行（锁 + 值） */
    .v-row { display: flex; align-items: center; gap: 5px; min-width: 0; }

    /* ========================================
       通用元素
    ======================================== */
    input, select {
      min-height: 36px; border: 1px solid rgba(139,160,175,0.2); border-radius: 8px;
      background: var(--input-bg); color: var(--text); padding: 7px 10px;
      outline: none; font: inherit; font-size: 13px;
      transition: all var(--duration-fast);
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,154,139,0.1); }

    .empty-state { padding: 32px 20px; color: var(--muted); text-align: center; font-size: 13px; line-height: 1.6; }
    .empty-state .icon-empty { font-size: 36px; display: block; margin-bottom: 8px; opacity: 0.5; }

    /* ========================================
       候选列表
    ======================================== */
    .candidate-list {
      display: grid; gap: 8px;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
    }
    .candidate {
      display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: center;
      padding: 10px 12px; border: 1px solid rgba(139,160,175,0.15); border-radius: var(--radius-sm);
      background: var(--input-bg); transition: all var(--duration-fast);
    }
    .candidate:hover { background: var(--glass-bg); }
    .candidate strong { display: block; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
    .candidate span { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }

    /* ========================================
       诊断区
    ======================================== */
    .diagnose { display: grid; gap: 6px; }
    .diagnose-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(139,160,175,0.08); }
    .diagnose-row:last-child { border-bottom: 0; }
    .diagnose-row span { color: var(--muted); font-size: 12px; }
    .diagnose-row strong { font-size: 13px; }
    .diagnose-preview { margin-top: 8px; padding: 10px; border-radius: 8px; background: rgba(139,160,175,0.08); color: var(--text-soft); font: 12px/1.55 ui-monospace, SFMono-Regular, Consolas, monospace; white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow: auto; }
    .diagnose-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--divider-light); }
    .diagnose-section h3 { margin: 0 0 7px; color: var(--heading); font-size: 12px; font-weight: 650; }
    .diagnose-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .diagnose-tag { max-width: 100%; padding: 4px 7px; border-radius: 999px; background: rgba(139,160,175,0.10); color: var(--text-soft); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .diagnose-tag.warn { background: rgba(212,168,83,0.14); color: var(--warn); }
    .diagnose-tag.ok { background: rgba(74,158,107,0.12); color: var(--ok); }
    .reasons { margin: 8px 0 0; padding-left: 16px; color: var(--muted); line-height: 1.7; font-size: 12px; }

    .simple-config { display: grid; gap: 10px; }
    .config-summary { padding: 9px 10px; border-radius: 8px; background: rgba(139,160,175,0.08); color: var(--text-soft); font-size: 12px; line-height: 1.55; }
    .config-grid { display: grid; gap: 8px; }
    .config-field { display: grid; gap: 4px; }
    .config-field label { color: var(--muted); font-size: 12px; }
    .toggle-line { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 0; color: var(--text-soft); font-size: 13px; border-bottom: 1px solid rgba(139,160,175,0.08); }
    .toggle-line:last-child { border-bottom: 0; }
    .toggle-line input { width: 16px; height: 16px; accent-color: var(--accent); }
    .config-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ========================================
       面包屑 / 返回
    ======================================== */
    .top-back-row {
      display: flex; align-items: center; margin-bottom: 10px;
    }
    .top-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 50px;
      background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; text-decoration: none;
      transition: all var(--duration-fast);
    }
    .top-back-btn:hover { box-shadow: 0 2px 12px rgba(91,154,139,0.3); transform: translateY(-1px); }

    /* ========================================
       Toast（排队）
    ======================================== */
    .toast-container {
      position: fixed; right: 18px; top: 18px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
      max-width: min(400px, calc(100vw - 36px));
    }
    .toast {
      padding: 10px 14px; border-radius: 10px; color: #fff; font-size: 13px;
      background: rgba(39,51,68,0.9); backdrop-filter: blur(12px);
      box-shadow: 0 4px 16px rgba(15,23,42,0.12);
      opacity: 0; transform: translateY(-10px) scale(0.95);
      transition: all var(--duration-normal) var(--ease-out);
      pointer-events: auto; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .toast.show { opacity: 1; transform: translateY(0) scale(1); }
    .toast.hiding { opacity: 0; transform: translateY(-8px) scale(0.95); }
    .toast.success { background: rgba(74,158,107,0.92); }
    .toast.error   { background: rgba(224,123,110,0.92); }

    /* ========================================
       Modal
    ======================================== */
    .modal {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 18px; background: rgba(15,23,42,0); z-index: 80;
      opacity: 0; pointer-events: none;
      transition: opacity var(--duration-normal), background var(--duration-normal);
    }
    .modal.show { opacity: 1; background: rgba(15,23,42,0.35); pointer-events: auto; }
    .modal-box {
      width: min(380px, 100%); padding: 20px; border-radius: var(--radius-md);
      background: var(--glass-bg); backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(15,23,42,0.15), inset 0 1px 0 rgba(255,255,255,0.7);
      transform: scale(0.92) translateY(10px);
      transition: transform var(--duration-normal) var(--ease-out);
    }
    .modal.show .modal-box { transform: scale(1) translateY(0); }
    .modal-box p { margin: 0 0 16px; line-height: 1.6; font-size: 14px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

    /* ========================================
       检查器折叠
    ======================================== */
    .inspector-toggle {
      display: none; position: fixed; right: 8px; top: 50%; transform: translateY(-50%);
      z-index: 50; width: 28px; height: 60px; border-radius: 14px;
      background: var(--glass-bg); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); cursor: pointer; font-size: 12px; color: var(--muted);
    }

    /* ========================================
       响应式
    ======================================== */
    @media (max-width: 1200px) {
      .app { grid-template-columns: 280px minmax(0, 1fr); gap: 10px; padding: 14px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .runtime-status { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 900px) {
      .app { display: block; padding: 12px; }
      .sidebar, .main, .inspector { margin-bottom: 12px; }
      .sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .sidebar .panel { grid-column: span 2; }
      .scope-list { max-height: 220px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .actions { width: 100%; }
      .toolbar { grid-template-columns: 1fr; }
      .inspector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .brand { text-align: left; }
    }
    @media (max-width: 500px) {
      .sidebar { grid-template-columns: 1fr; }
      .inspector { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .runtime-status { grid-template-columns: 1fr 1fr; }
    }

    /* 无障碍 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

  <script type="module">
    const entryParams = new URLSearchParams(location.search || "");
    if (entryParams.get("manage") !== "1") {
      const target = `diary.html?${entryParams.toString()}`;
      window.location.replace(target);
    }

    const bridge = window.AstrBotPluginPage;
    await bridge.ready();

    const $ = (id) => document.getElementById(id);
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;",
      }[ch]));
    }

    function formatBytes(value) {
      const n = Number(value || 0);
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(2)} MB`;
    }
    function runningText(value) { return value ? "运行中" : "未运行"; }
    function statusChip(label, value, tone = "neutral") {
      return `<div class="status-chip ${tone}"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
    }
    function renderTags(items, emptyText, tone = "neutral") {
      const values = (items || []).filter(v => String(v || "").trim());
      if (!values.length) return `<span class="diagnose-tag">${escapeHtml(emptyText)}</span>`;
      return values.map(v => `<span class="diagnose-tag ${tone}">${escapeHtml(v)}</span>`).join("");
    }

    /* ========================================
       主题管理
    ======================================== */
    const THEME_KEY = "yeli_theme";
    const DARK_KEY = "yeli_dark";

    function persistThemeConfig(patch) {
      try {
        bridge.apiPost("relationship/config", patch).catch(() => {});
      } catch (_) {}
    }
    function applyTheme(theme, persist = false) {
      theme = theme || "glass";
      document.documentElement.setAttribute("data-theme", theme);
      try { localStorage.setItem(THEME_KEY, theme); } catch(_){}
      window.__yeliTheme = theme;
      document.querySelectorAll(".theme-option").forEach(o => o.classList.toggle("active", o.dataset.theme === theme));
      if (persist) persistThemeConfig({ webui_theme: theme });
    }
    function setDarkMode(mode, persist = false) {
      mode = mode === "dark" ? "dark" : "light";
      const db = $("darkModeBtn");
      if (mode === "dark") {
        document.documentElement.setAttribute("data-theme-mode", "dark");
        if (db) db.textContent = "☀️";
      } else {
        document.documentElement.removeAttribute("data-theme-mode");
        if (db) db.textContent = "🌙";
      }
      try { localStorage.setItem(DARK_KEY, mode); } catch(_){}
      window.__yeliDarkMode = mode;
      if (persist) persistThemeConfig({ webui_dark_mode: mode });
    }
    function toggleDark() {
      const isDark = document.documentElement.getAttribute("data-theme-mode") === "dark";
      setDarkMode(isDark ? "light" : "dark", true);
    }
    function showThemeMenu(btn) {
      const menu = $("themeMenu"); if (!menu) return;
      const rect = btn.getBoundingClientRect();
      menu.style.top = (rect.bottom + 8) + "px";
      menu.style.left = (rect.left - 80) + "px";

    /* ========================================
       Toast 排队系统
    ======================================== */
    const toastQueue = [];
    let toastTimer = null;

    function toast(message, type = "info") {
      toastQueue.push({ message, type });
      if (toastQueue.length === 1) showNextToast();
    }

    function showNextToast() {
      if (toastQueue.length === 0) return;
      const { message, type } = toastQueue[0];
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = message;
      el.addEventListener("click", () => dismissToast(el));
      $("toastContainer").appendChild(el);

      requestAnimationFrame(() => { el.classList.add("show"); });

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => dismissToast(el), 2800);
    }

    function dismissToast(el) {
      if (!el.parentNode) return;
      el.classList.remove("show");
      el.classList.add("hiding");
      clearTimeout(toastTimer);
      setTimeout(() => {
        el.remove();
        toastQueue.shift();
        showNextToast();
      }, 200);
    }

    /* ========================================

    ======================================== */
    function confirmAsync(message) {
      return new Promise((resolve) => {
        const modal = $("confirmModal");
        const ok = $("confirmOk"), cancel = $("confirmCancel");
        $("confirmMessage").textContent = message;
        modal.classList.add("show");
        const cleanup = () => {
          modal.classList.remove("show");
          ok.removeEventListener("click", onOk);
          cancel.removeEventListener("click", onCancel);
          modal.removeEventListener("click", onBackdrop);
        };
        const onOk = () => { cleanup(); resolve(true); };
        const onCancel = () => { cleanup(); resolve(false); };
        const onBackdrop = (e) => { if (e.target === modal) { cleanup(); resolve(false); } };
        ok.addEventListener("click", onOk);
        cancel.addEventListener("click", onCancel);
        modal.addEventListener("click", onBackdrop);
      });
    }

    /* ========================================
       统计数字渐变
    ======================================== */
    function animateValue(el, target, duration = 350) {
      const current = parseInt(el.textContent) || 0;
      if (current === target) return;
      const start = performance.now();
      const diff = target - current;
      const tick = (now) => {
        const t = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(current + diff * eased);
        if (t < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }

      const injectTone = data ? (data.would_inject ? "ok" : "warn") : "neutral";

      const issueCount = data ? ((data.alias_conflicts || []).length + (data.alias_ignored_short || []).length + (data.inject_truncated ? 1 : 0)) : 0;

        statusChip("\u7f13\u5b58/\u98ce\u9669", `${cacheSize}/${cacheLimit} \u00b7 ${issueValue}`, issueCount ? "warn" : "neutral"),

        return [row.qq_id, row.nickname, row.aliases, row.title_manual, row.title_auto, row.relation_type, row.note_manual, row.note_auto].join(" ").toLowerCase().includes(q);
      });
    }

    function totalPages(t) { return Math.max(1, Math.ceil(t / state.pageSize)); }
    function resetPage() { state.page = 1; }

    function updatePager(rows) {
      const total = rows.length;
      const pages = totalPages(total);
      if (state.page > pages) state.page = pages;
      if (state.page < 1) state.page = 1;
      const start = total ? (state.page-1)*state.pageSize+1 : 0;
      const end = total ? Math.min(total, state.page*state.pageSize) : 0;
      $("pageInfo").textContent = `${start}-${end} / ${total} 条（共 ${pages} 页）`;
      $("firstPageBtn").disabled = state.page <= 1;
      $("prevPageBtn").disabled = state.page <= 1;
      $("nextPageBtn").disabled = state.page >= pages;
      $("lastPageBtn").disabled = state.page >= pages;
      $("pageSizeSelect").value = String(state.pageSize);
    }

    function editableValue(row, field, fallback = "") {
      const wrap = document.createElement("span");

      const span = document.createElement("span");
      const val = String(row[field] ?? fallback ?? "").trim();
      span.className = `value${val ? "" : " empty"}`;
      span.textContent = val || "空";

      const hint = document.createElement("span");
      hint.className = "edit-hint";
      hint.textContent = "✎";

      wrap.appendChild(span);
      wrap.appendChild(hint);
      span.addEventListener("dblclick", () => startEdit(span, row, field, val));
      return wrap;
    }

    function startEdit(span, row, field, oldVal) {
      const input = document.createElement("input");
      input.className = "edit-input";
      input.value = oldVal;
      span.replaceWith(input);
      input.focus(); input.select();
      const finish = async (save) => {
        const newVal = input.value.trim();
        input.replaceWith(span);
        if (!save || newVal === oldVal) return;
        try {
          const resp = await bridge.apiPost("relationship/update", currentScopePayload({ qq_id: row.qq_id, field, value: newVal }));
          if (!resp.success) throw new Error(resp.error || resp.message || "保存失败");
          toast(resp.message || "保存成功", "success");
          await loadData();
        } catch (err) { toast(`保存失败：${err.message}`, "error"); }
      };
      input.addEventListener("blur", () => finish(true), { once: true });
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") input.blur(); if (e.key === "Escape") finish(false); });
    }

            impLevel.className = "importance-level";
            impLevel.title = "0-20 普通 / 21-50 熟悉 / 51-80 重要 / 81-100 核心";
            impLevel.textContent = importanceLabel(row.importance);
            impWrap.appendChild(impLevel);
            impTd.appendChild(impWrap);
            tr.appendChild(impTd);

            // 备注
            const noteTd = document.createElement("td");
            noteTd.className = "col-note";
            const noteWrap = document.createElement("div");
            noteWrap.className = "v-row";
            noteWrap.appendChild(lockButton(row, row.note_manual ? "note_manual" : "note_auto"));
            noteWrap.appendChild(editableValue(row, row.note_manual ? "note_manual" : "note_auto", note));
            noteTd.appendChild(noteWrap);
            tr.appendChild(noteTd);

            // 活跃
            const activeTd = document.createElement("td");
            activeTd.className = "col-active";
            const ac = document.createElement("div");
            ac.className = "active-cell";
            const countSpan = document.createElement("span");
            countSpan.className = "pill neutral";
            countSpan.textContent = `${row.msg_count||0} 条消息`;
            const seenSpan = document.createElement("span");
            seenSpan.className = "muted";
            seenSpan.textContent = row.last_seen || "未记录";
            ac.appendChild(countSpan);
            ac.appendChild(seenSpan);
            activeTd.appendChild(ac);
            tr.appendChild(activeTd);

            // 操作
            const actionTd = document.createElement("td");
            actionTd.className = "col-actions";
            const actionWrap = document.createElement("div");
            actionWrap.className = "action-buttons";
            const hasAutoFields = !!(row.title_auto || row.note_auto);
            const clearBtn = document.createElement("button");
            clearBtn.className = "icon-soft";
            clearBtn.title = hasAutoFields ? "清空自动称呼和自动备注" : "没有可清空的自动字段";
            clearBtn.textContent = "清";
            clearBtn.disabled = !hasAutoFields;
            clearBtn.addEventListener("click", async () => {
              if (!hasAutoFields) return;
              if (!(await confirmAsync(`清空 ${row.nickname||row.qq_id} 的自动称呼和自动备注？`))) return;
              try {
                const resp = await bridge.apiPost("relationship/clear_auto", currentScopePayload({ qq_id: row.qq_id }));
                if (!resp.success) throw new Error(resp.error||resp.message||"清空失败");
                toast(resp.message||"已清空自动字段", "success");
                await loadData();
              } catch (err) { toast(`清空失败：${err.message}`, "error"); }
            });
            const delBtn = document.createElement("button");
            delBtn.className = "icon-danger";
            delBtn.title = "删除";
            delBtn.textContent = "×";
            delBtn.addEventListener("click", async () => {
              if (!(await confirmAsync(`删除 ${row.nickname||row.qq_id} 在当前作用域的资料？`))) return;
              tr.style.transition = "all 0.2s ease-out";
              tr.style.opacity = "0";
              tr.style.transform = "translateX(-16px)";
              await new Promise(r => setTimeout(r, 200));
              try {
                const resp = await bridge.apiPost("relationship/delete", currentScopePayload({ qq_id: row.qq_id }));
                if (!resp.success) throw new Error(resp.error||resp.message||"删除失败");
                toast(resp.message||"删除成功", "success");
                await loadData();
              } catch (err) { toast(`删除失败：${err.message}`, "error"); renderRows(); }
            });
            actionWrap.appendChild(clearBtn);
            actionWrap.appendChild(delBtn);
            actionTd.appendChild(actionWrap);
            tr.appendChild(actionTd);

            tbody.appendChild(tr);
          }
        }
        requestAnimationFrame(() => { tbody.style.opacity = "1"; tbody.style.transform = "translateY(0)"; });
      }, 120);
    }

    function renderActive() {
      const list = $("activeList");
      list.innerHTML = "";
      if (!state.activeRows.length) {
        list.innerHTML = '<div class="empty-state"><span class="icon-empty">👤</span><p>暂无活跃候选</p></div>';
        return;
      }
      for (const row of state.activeRows) {
        const item = document.createElement("div");
        item.className = "candidate";
        const info = document.createElement("div");
        const name = document.createElement("strong");
        name.textContent = row.nickname || row.qq_id;
        const meta = document.createElement("span");
        meta.textContent = `${row.qq_id} · ${row.msg_count||0} 条 · ${row.last_seen||"未记录"}`;
        info.appendChild(name);
        info.appendChild(meta);
        item.appendChild(info);
        const btn = document.createElement("button");
        btn.className = "secondary";
        btn.textContent = "入册";
        btn.style.cssText = "padding:5px 12px;font-size:12px;";
        btn.addEventListener("click", async () => {
          item.style.transition = "all 0.2s ease-out";
          item.style.opacity = "0";
          item.style.transform = "scale(0.9)";
          await new Promise(r => setTimeout(r, 200));
          try {
            const resp = await bridge.apiPost("relationship/add", currentScopePayload({ qq_id: row.qq_id, nickname: row.nickname||"" }));
            if (!resp.success) throw new Error(resp.error||resp.message||"入册失败");
            toast(resp.message||"已入册", "success");
            await loadAll();
          } catch (err) { toast(`入册失败：${err.message}`, "error"); renderActive(); }
        });
        item.appendChild(btn);
        list.appendChild(item);
      }
    }

    function renderDiagnosis() {
      const box = $("diagnoseBox");
      const data = state.diagnosis;
      if (!data) {
        box.innerHTML = '<div class="empty-state"><span class="icon-empty">&#128269;</span><p>\u70b9\u51fb\u72b6\u6001\u68c0\u6d4b\u67e5\u770b\u6ce8\u5165\u4e0e\u5199\u5165\u72b6\u6001</p></div>';
        $("injectBadge").textContent = "\u672a\u68c0\u6d4b";
        $("injectBadge").className = "pill neutral";
        renderRuntimeStatus();
        return;
      }
      $("injectBadge").textContent = data.would_inject ? "\u4f1a\u6ce8\u5165" : "\u4e0d\u6ce8\u5165";
      $("injectBadge").className = `pill ${data.would_inject?"ok":"warn"}`;
      const preview = data.inject_preview ? escapeHtml(data.inject_preview) : "\u6682\u65e0\u6ce8\u5165\u5185\u5bb9";
      const reasons = (data.reasons || []).map(r => `<li>${escapeHtml(r)}</li>`).join("");
      const profiles = (data.matched_profiles || []).map(row => {
        const name = row.nickname ? `${row.nickname} / ${row.qq_id}` : row.qq_id;
        const scope = row.scope_type ? `${row.scope_type}:${row.scope_id}` : "";
        return `${name}${scope ? " \u00b7 " + scope : ""}`;
      });
      const hitTokens = [
        ...(data.last_mentions || []).map(v => `@/QQ ${v}`),
        ...(data.alias_hits || []).map(v => `\u522b\u540d ${v}`),
        ...(data.target_ids || []).map(v => `\u76ee\u6807 ${v}`),
      ];
      const conflicts = (data.alias_conflicts || []).map(item => `${item.token || "?"}: ${(item.qq_ids || []).join(",")}`);
      const ignored = (data.alias_ignored_short || []).map(item => item.token || String(item));
      box.innerHTML = `
        <div class="diagnose-row"><span>\u8bfb\u53d6</span><strong>${data.allowed_read?"\u5141\u8bb8":"\u62e6\u622a"}</strong></div>
        <div class="diagnose-row"><span>\u5199\u5165</span><strong>${data.allowed_write?"\u5141\u8bb8":"\u62e6\u622a"}</strong></div>
        <div class="diagnose-row"><span>\u6ce8\u5165</span><strong>${data.would_inject?"\u4f1a\u6ce8\u5165":"\u4e0d\u6ce8\u5165"} \u00b7 ${data.matched_count||0}\u4eba</strong></div>
        <div class="diagnose-row"><span>\u5b57\u7b26\u9884\u7b97</span><strong>${data.inject_char_count||0}/${data.inject_max_chars||0}${data.inject_truncated?" \u00b7 \u5df2\u88c1\u526a":""}</strong></div>
        <div class="diagnose-row"><span>\u4e92\u901a\u7b56\u7565</span><strong>${escapeHtml(data.sharing_mode||"global_fallback")} \u00b7 ${escapeHtml(data.inject_budget_mode||"balanced")}</strong></div>
        <div class="diagnose-row"><span>\u5feb\u7167\u7f13\u5b58</span><strong>${data.turn_context_cache_size||0}/${data.turn_context_cache_limit||0} \u00b7 ${data.turn_context_ttl_seconds||0}s</strong></div>
        <div class="diagnose-section"><h3>\u547d\u4e2d\u5bf9\u8c61</h3><div class="diagnose-tags">${renderTags(profiles, "\u6682\u65e0\u547d\u4e2d\u8d44\u6599", "ok")}</div></div>
        <div class="diagnose-section"><h3>\u547d\u4e2d\u6765\u6e90</h3><div class="diagnose-tags">${renderTags(hitTokens, "\u672a\u547d\u4e2d @/QQ/\u522b\u540d")}</div></div>
        <div class="diagnose-section"><h3>\u51b2\u7a81\u4e0e\u5ffd\u7565</h3><div class="diagnose-tags">${renderTags([...conflicts, ...ignored], "\u65e0\u51b2\u7a81", conflicts.length ? "warn" : "neutral")}</div></div>
        <div class="diagnose-section"><h3>\u5b9e\u9645\u6ce8\u5165\u9884\u89c8</h3><div class="diagnose-preview">${preview}</div></div>
        <ul class="reasons">${reasons}</ul>`;
      renderRuntimeStatus();
    }

    function renderMaintenance() {
      const box = $("maintenanceBox");
      if (!box) return;
      const data = state.maintenance;
      if (!data) {
        box.innerHTML = '<div class="empty-state"><p>维护状态未读取</p></div>';
        return;
      }
      const counts = data.counts || {};
      const cleanupLine = data.cleanup_deleted
        ? `<div class="diagnose-row"><span>本次清理</span><strong>${data.cleanup_deleted}</strong></div>`
        : "";
      box.innerHTML = `
        <div class="diagnose-row"><span>资料/别名</span><strong>${counts.profiles||0} / ${counts.aliases||0}</strong></div>
        <div class="diagnose-row"><span>活跃/日记录</span><strong>${counts.active_seen||0} / ${counts.active_daily||0}</strong></div>
        <div class="diagnose-row"><span>历史去重/日志</span><strong>${counts.history_seen||0} / ${counts.op_logs||0}</strong></div>
        <div class="diagnose-row"><span>数据库</span><strong>${formatBytes(data.database_bytes||0)}</strong></div>
        <div class="diagnose-row"><span>后台任务</span><strong>清理${runningText(data.history_cleanup_task_running)} ? 维护${data.auto_maintain_running_tasks||0}/${data.auto_maintain_task_limit||0}</strong></div>
        <div class="diagnose-row"><span>快照缓存</span><strong>${data.turn_context_cache_size||0}/${data.turn_context_cache_limit||0}</strong></div>
        <div class="diagnose-row"><span>保留</span><strong>历史${data.history_seen_retention_days||0}天 ? 活跃${data.active_retention_days||0}天</strong></div>
        ${cleanupLine}`;
    }

    async function loadConfig() {
      const resp = await bridge.apiGet("relationship/config");
      if (!resp.success) throw new Error(resp.error||"配置读取失败");
      state.config = resp.config || {};
      state.pluginVersion = resp.version || state.pluginVersion;
      applyTheme(state.config.webui_theme || savedTheme || "glass", false);
      setDarkMode(state.config.webui_dark_mode || savedDark || "light", false);
      applyScopeFromUrl();
      renderScopes();
      renderStats();
    }
    async function loadData() {
      const resp = await bridge.apiPost("relationship", currentScopePayload());
      if (!resp.success) throw new Error(resp.error||"资料读取失败");
      state.rows = resp.rows || [];
      relationOptions(state.rows);
      renderRows();
      renderStats();
    }
    async function loadActive() {
      const resp = await bridge.apiPost("relationship/active", currentScopePayload({ limit: 30 }));
      if (!resp.success) throw new Error(resp.error||"活跃候选读取失败");
      state.activeRows = resp.rows || [];
      renderActive();
      renderStats();
    }
    async function runDiagnose() {
      const resp = await bridge.apiPost("relationship/diagnose", currentScopePayload());
      if (!resp.success) throw new Error(resp.error||"状态检测失败");
      state.diagnosis = resp.diagnosis || null;
      state.activeRows = resp.active_rows || state.activeRows;
      renderDiagnosis();
      renderActive();
      renderStats();
    }
    async function loadMaintenance(action = "status") {
      const resp = await bridge.apiPost("relationship/maintenance", { action });
      if (!resp.success) throw new Error(resp.error||"维护状态读取失败");
      state.maintenance = resp.maintenance || null;
      renderMaintenance();
      renderRuntimeStatus();
      return state.maintenance;
    }
    async function loadAll() {
      try { await loadData(); await loadActive(); await loadMaintenance(); state.diagnosis = null; renderDiagnosis(); }
      catch (err) { toast(err.message, "error"); }
    }

    /* ========================================
       事件绑定
    ======================================== */
    $("saveSimpleConfigBtn").addEventListener("click", async () => {
      try { await saveSimpleConfig(); } catch(e) { toast(e.message, "error"); }
    });
    $("applyRecommendedBtn").addEventListener("click", async () => {
      try { await applyRecommendedConfig(); await loadAll(); } catch(e) { toast(e.message, "error"); }
    });
    $("reloadConfigBtn").addEventListener("click", async () => {
      try { await loadConfig(); await loadAll(); toast("配置已刷新", "success"); } catch(e) { toast(e.message, "error"); }
    });
    $("privateScopeBtn").addEventListener("click", () => {
      const id = $("privateScopeSelect").value;
      if (!id) { toast("请先在 user_whitelist 配置私聊 QQ", "error"); return; }
      setScope({ scope_type:"private", scope_id:id, label:`私聊 ${id}` });
    });
    $("refreshBtn").addEventListener("click", loadAll);
    $("activeBtn").addEventListener("click", async () => {
      try { await loadActive(); toast("活跃候选已更新", "success"); } catch(e) { toast(e.message, "error"); }
    });
    $("diagnoseBtn").addEventListener("click", async () => {
      try { await runDiagnose(); toast("检测完成", "success"); } catch(e) { toast(e.message, "error"); }
    });
    $("maintenanceCleanupBtn").addEventListener("click", async () => {
      try { const data = await loadMaintenance("cleanup"); toast(`过期数据已清理：${data?.cleanup_deleted||0}`, "success"); } catch(e) { toast(e.message, "error"); }
    });
    $("forceInjectBtn").addEventListener("click", async () => {
      try {
        const resp = await bridge.apiPost("relationship/force_inject", {});
        if (!resp.success) throw new Error(resp.error||"标记失败");
        toast(resp.message||"下次对话会刷新注入", "success");
      } catch(e) { toast(e.message, "error"); }
    });
    $("addBtn").addEventListener("click", async () => {
      const qq = $("newQq").value.trim();
      const nickname = $("newNickname").value.trim();
      if (!qq) { toast("请填写 QQ 号", "error"); return; }
      try {
        const resp = await bridge.apiPost("relationship/add", currentScopePayload({ qq_id:qq, nickname }));
        if (!resp.success) throw new Error(resp.error||resp.message||"添加失败");
        $("newQq").value = ""; $("newNickname").value = "";
        toast(resp.message||"添加成功", "success");
        await loadData();
      } catch(e) { toast(e.message, "error"); }
    });
    let searchTimer = null;
    $("searchInput").addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { resetPage(); renderRows(); }, 250);
    });
    $("relationFilter").addEventListener("change", () => { resetPage(); renderRows(); });
    $("pageSizeSelect").addEventListener("change", () => {
      state.pageSize = Number($("pageSizeSelect").value)||10;
      resetPage(); renderRows();
    });
    $("firstPageBtn").addEventListener("click", () => { state.page=1; renderRows(); });
    $("prevPageBtn").addEventListener("click", () => { state.page=Math.max(1,state.page-1); renderRows(); });
    $("nextPageBtn").addEventListener("click", () => { state.page=Math.min(totalPages(filteredRows().length),state.page+1); renderRows(); });
    $("lastPageBtn").addEventListener("click", () => { state.page=totalPages(filteredRows().length); renderRows(); });

    /* ========================================
       启动
    ======================================== */
    try { await loadConfig(); await loadAll(); } catch(e) { toast(e.message, "error"); }
  </script>
</body>
</html>
